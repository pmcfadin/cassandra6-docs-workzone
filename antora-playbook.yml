# Antora playbook for Cassandra 6 Docs Workzone
# This builds a local preview of draft documentation.
# It is NOT the official Cassandra docs build.
#
# Usage:
#   npx antora antora-playbook.yml
#
# Output: build/site/

site:
  title: 'Apache Cassandra 6 Docs — Preview'
  url: ~
  start_page: home::index.adoc

content:
  sources:
    - url: .
      start_path: content/home
      branches: HEAD
    - url: .
      start_path: content/operators
      branches: HEAD
    - url: .
      start_path: content/developers
      branches: HEAD
    - url: .
      start_path: content/contributors
      branches: HEAD
    - url: .
      start_path: content/reference
      branches: HEAD

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true

output:
  dir: ./build/site

runtime:
  fetch: true
